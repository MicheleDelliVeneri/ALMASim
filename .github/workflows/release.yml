name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:

  # ------------------------------------------------------------------
  # 1. Validate that the pushed tag matches the version in pyproject.toml
  # ------------------------------------------------------------------
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: tag
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Assert tag matches pyproject.toml
        run: |
          PKG=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "ERROR: tag $TAG does not match pyproject.toml version $PKG"
            exit 1
          fi

  # ------------------------------------------------------------------
  # 2. Run the full lint + test suite (reuses the existing workflow)
  # ------------------------------------------------------------------
  tests:
    needs: validate
    uses: ./.github/workflows/lint_and_test.yml
    secrets: inherit

  # ------------------------------------------------------------------
  # 3. Build wheel + sdist and publish to PyPI via OIDC trusted publisher
  #    Setup required once on PyPI:
  #    https://docs.pypi.org/trusted-publishers/adding-a-publisher/
  #    Owner: MicheleDelliVeneri  Repo: ALMASim
  #    Workflow: release.yml  Environment: pypi
  # ------------------------------------------------------------------
  publish-pypi:
    needs: tests
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/almasim/
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Build distributions
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ------------------------------------------------------------------
  # 4. Create a GitHub Release and attach the built artifacts
  # ------------------------------------------------------------------
  github-release:
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Rebuild distributions (for attachment)
        run: uv build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

  # ------------------------------------------------------------------
  # 5. Build and push backend Docker image to GHCR
  # ------------------------------------------------------------------
  docker:
    needs: github-release
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/almasim-backend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
