version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"

sphinx:
  configuration: docs/source/conf.py
  fail_on_warning: false

# Only build HTML; skip PDF / EPUB to keep build time and resource usage low
# (project was previously disabled for abuse — see RTD support ticket).
formats: []

python:
  install:
    - requirements: docs/requirements.txt
