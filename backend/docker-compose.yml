version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: almasim-backend
    image: almasim-backend:latest
    ports:
      - "8000:8000"
    environment:
      - MAIN_DIR=/app/src/almasim
      - DATA_DIR=/app/data
      - OUTPUT_DIR=/app/outputs
      - TNG_DIR=/app/data/TNG100-1
      - GALAXY_ZOO_DIR=/app/data/galaxy_zoo
      - HUBBLE_DIR=/app/data/hubble
    volumes:
      # Mount data directory for persistence (read-only for safety)
      - ../data:/app/data:ro
      # Mount outputs directory for simulation results
      - ./outputs:/app/outputs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # Optional: Set resource limits
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2'
    #       memory: 4G
    #     reservations:
    #       cpus: '1'
    #       memory: 2G

