version: "3.8"

services:
  # PostgreSQL database service
  postgres:
    image: postgres:16-alpine
    container_name: almasim-postgres
    environment:
      - POSTGRES_USER=almasim
      - POSTGRES_PASSWORD=almasim_dev_password
      - POSTGRES_DB=almasim
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U almasim -d almasim"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - almasim-network

  # Backend FastAPI service
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: almasim-backend
    image: almasim-backend:latest
    ports:
      - "8000:8000"
    environment:
      - MAIN_DIR=/app/src/almasim
      - DATA_DIR=/app/data
      - OUTPUT_DIR=/app/outputs
      - TNG_DIR=/app/data/TNG100-1
      - GALAXY_ZOO_DIR=/app/data/galaxy_zoo
      - HUBBLE_DIR=/app/data/hubble
      - DATABASE_URL=postgresql://almasim:almasim_dev_password@postgres:5432/almasim
    volumes:
      # Mount data directory for persistence (read-only for safety)
      - ./data:/app/data:ro
      # Mount outputs directory for simulation results
      - ./backend/outputs:/app/outputs
      # Mount source code for hot reload (no rebuild needed on code changes)
      - ./backend/app:/app/backend/app
      - ./backend/database:/app/backend/database
      - ./src:/app/src
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/backend
      --reload-dir /app/src
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - almasim-network

  # Frontend SvelteKit service (development mode with hot reload)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: almasim-frontend
    image: almasim-frontend:dev
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
      - NODE_ENV=development
    volumes:
      # Mount source code for hot reload
      - ./frontend/src:/app/src
      - ./frontend/static:/app/static
      - ./frontend/svelte.config.js:/app/svelte.config.js
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - ./frontend/postcss.config.js:/app/postcss.config.js
      # Exclude node_modules from volume mount
      - /app/node_modules
      - /app/.svelte-kit
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000', (r) => {if(r.statusCode !== 200 && r.statusCode !== 304) throw new Error(r.statusCode)})",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - almasim-network

networks:
  almasim-network:
    driver: bridge

volumes:
  postgres_data:
